name: JD Price Bot（按需触发版）
on:
  # 触发方式1：手动触发（GitHub页面点一下运行）
  workflow_dispatch:
    inputs:
      server_config:
        description: '服务器配置文本'
        required: true
        type: string
  # 触发方式2：API触发（飞书机器人调用）
  repository_dispatch:
    types: [price_check]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
      
      - name: 运行比价脚本
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          SERVER_CONFIG: ${{ github.event.inputs.server_config || github.event.client_payload.server_config }}
        run: |
          # 把配置写入临时文件，供脚本读取
          echo "$SERVER_CONFIG" > config.txt
          python run_price_check.py  # 新增的独立比价脚本
